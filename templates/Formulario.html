<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario de Caso</title>
</head>

<body>
    <h2>Formulario de Registro de Caso</h2>

    <form method="POST">

        <label>Nombre del Analista:</label><br>
        <input type="text" name="analista" required><br><br>

        <label>Nombre del Sistema:</label><br>
        <select name="sistema" required>
            <option value="">-- Seleccione --</option>
            <option>MISCF</option>
            <option>SCC</option>
            <option>SEMS</option>
            <option>SIAE</option>
            <option>SIBI</option>
            <option>SIC</option>
            <option>SICA</option>
            <option>SICO</option>
            <option>SICOVE</option>
            <option>SICS</option>
            <option>SIF</option>
            <option>SIF-APEX</option>
            <option>SIGR</option>
            <option>SIMAS</option>
            <option>SIREHS</option>
            <option>SIREMA</option>
            <option>SIRH</option>
            <option>SIRH-APEX</option>
            <option>SICOI</option>
            <option>SISER</option>
            <option>SISO</option>
            <option>SITH</option>
            <option>SIVEN</option>
            <option>SADU</option>
            <option>ANE</option>
            <option>INOCUIDAD</option>
            <option>SATD</option>
            <option>SBBD</option>
            <option>SGJD</option>
            <option>SGP</option>
            <option>SIFA</option>
            <option>SNE</option>
            <option>SIGIL</option>
            <option>SII</option>
            <option>SIMAS_</option>
            <option>SINAFOR</option>
            <option>SIRIA</option>
            <option>SIPG</option>
            <option>SISAE</option>
        </select><br><br>

        <label>Número de Caso:</label><br>
        <input type="text" name="numero_caso" required><br><br>

        <label>Prioridad:</label><br>
        <select name="prioridad">
            <option value="1">1- Alta</option>
            <option value="2">2- Media</option>
            <option value="3">3- Baja</option>
        </select><br><br>

        <label>Observaciones:</label><br>
        <textarea name="observaciones" rows="4" cols="40"></textarea><br><br>

        <label>¿Definido al 30/09?</label><br>
        <input type="radio" name="defino_3009" value="Sí" required> Sí
        <input type="radio" name="defino_3009" value="No"> No<br><br>

        <label>¿Atendido a la fecha?</label><br>
        <input type="radio" name="atendido_fecha" value="Sí" required> Sí
        <input type="radio" name="atendido_fecha" value="No"> No<br><br>

        <button type="submit">Enviar</button>
    </form>
</body>

</html>
