<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Casos</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
        }

        .header {
            background: #4a1a1a; /* Tono oscuro de tu imagen */
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 28px; text-transform: uppercase; }
        .header p { margin: 5px 0 0; opacity: 0.8; font-size: 14px; }

        form { padding: 40px; }

        fieldset {
            border: none;
            background: #fdf6f0; /* Fondo crema suave */
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 25px;
        }

        legend {
            font-weight: bold;
            color: #4a1a1a;
            font-size: 1.2rem;
            margin-bottom: 15px;
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 14px;
        }

        .radio-group { margin-top: 10px; }
        .radio-group label { display: inline; margin-right: 15px; font-weight: normal; }

        button {
            background: #4a1a1a;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover { background: #632525; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Registrar Caso</h1>
        <p>Información general y datos del caso</p>
    </div>

    <form method="POST">
        <!-- Información General -->
        <fieldset>
            <legend>Información General</legend>
            <div class="grid">
                <div>
                    <label for="analista">Nombre del Analista:</label>
                    <input type="text" id="analista" name="analista" required maxlength="100">
                </div>
                <div>
                    <label for="sistema">Nombre del Sistema:</label>
                    <select id="sistema" name="sistema" required>
                        <option value="">-- Seleccione --</option>
                        <option>MISCF</option><option>SCC</option><option>SEMS</option>
                        <option>SIAE</option><option>SIBI</option><option>SIC</option>
                        <!-- Agrega el resto de opciones aquí -->
                    </select>
                </div>
            </div>
        </fieldset>

        <!-- Datos del Caso -->
        <fieldset>
            <legend>Datos del Caso</legend>
            <div class="grid">
                <div>
                    <label for="numero_caso">Número de Caso:</label>
                    <input type="text" id="numero_caso" name="numero_caso" required maxlength="50">
                </div>
                <div>
                    <label for="prioridad">Prioridad:</label>
                    <select id="prioridad" name="prioridad" required>
                        <option value="1">1 - Alta</option>
                        <option value="2">2 - Media</option>
                        <option value="3">3 - Baja</option>
                    </select>
                </div>
                <div class="full-width">
                    <label for="observaciones">Observaciones:</label>
                    <textarea id="observaciones" name="observaciones" rows="3" maxlength="500"></textarea>
                </div>
            </div>
        </fieldset>

        <!-- Estado -->
        <fieldset>
            <legend>Estado</legend>
            <div class="grid">
                <div>
                    <label>¿Definido al 30/09?</label>
                    <div class="radio-group">
                        <input type="radio" id="def_si" name="defino_3009" value="Sí" required>
                        <label for="def_si">Sí</label>
                        <input type="radio" id="def_no" name="defino_3009" value="No">
                        <label for="def_no">No</label>
                    </div>
                </div>
                <div>
                    <label>¿Atendido a la fecha?</label>
                    <div class="radio-group">
                        <input type="radio" id="aten_si" name="atendido_fecha" value="Sí" required>
                        <label for="aten_si">Sí</label>
                        <input type="radio" id="aten_no" name="atendido_fecha" value="No">
                        <label for="aten_no">No</label>
                    </div>
                </div>
            </div>
        </fieldset>

        <button type="submit">Guardar Caso</button>
    </form>
</div>

</body>
</html>
